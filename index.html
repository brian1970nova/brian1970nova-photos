<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brian's Photo Gallery</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: url('/family%20photos%20cover.jpg') center/cover no-repeat fixed;
      color: #f0f0f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* Frosted card behind text only — photo stays crisp and full brightness */
    .splash {
      text-align: center;
      padding: 2.5rem 3rem;
      background: rgba(0, 0, 0, 0.50);
      border-radius: 12px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.15);
    }
    h1 {
      font-size: 3rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
      color: #ffffff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    }
    p {
      color: #e8e8e8;
      margin-bottom: 2rem;
      font-size: 1.1rem;
    }
    a {
      display: inline-block;
      padding: 0.9rem 2.5rem;
      background: #e8c060;
      color: #0f0f0f;
      text-decoration: none;
      border-radius: 4px;
      font-weight: 600;
      font-size: 1rem;
      transition: background 0.2s;
    }
    a:hover { background: #f5d47a; }
  </style>
</head>
<body>
  <div class="splash">
    <h1>Brian's Photos</h1>
    <p>Family photo gallery</p>
    <a href="/photos/">View Gallery</a>
  </div>
</body>
</html>
